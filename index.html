<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Je0pardy! AI - Edizione Definitiva</title>
    <script src="js/backupTrivia.js"></script>
    <script src="js/config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="min-h-screen bg-slate-950 text-white font-sans flex flex-col justify-between select-none">

<div id="app" class="flex-grow flex flex-col justify-center items-center p-4 w-full max-w-7xl mx-auto"></div>

<div id="game-modal" class="fixed inset-0 bg-black/95 flex items-center justify-center p-4 hidden z-40">
    <div class="bg-slate-900 border-4 border-blue-500 p-10 rounded-3xl max-w-3xl w-full text-center shadow-2xl relative">
        <div id="modal-loading" class="py-12">
            <div id="loading-spinner" class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-yellow-400 mx-auto mb-4"></div>
            <p id="loading-text" class="text-yellow-400 font-mono text-sm uppercase tracking-widest">Lancio della moneta 50/50...</p>
            <p id="modal-status-extra" class="text-slate-500 text-xs mt-2 font-mono italic"></p>
        </div>
        
        <div id="modal-content" class="hidden">
            <div class="mb-8 flex flex-col sm:flex-row justify-center items-center gap-3">
                <span id="modal-badge-cat" class="text-xs px-4 py-2 bg-blue-500/20 text-blue-400 rounded-full font-bold uppercase tracking-widest border-2 border-blue-500/50"></span>
                <span id="modal-badge-source" class="text-xs px-4 py-2 rounded-full font-black uppercase tracking-widest border-2"></span>
            </div>
            
            <h2 id="modal-question" class="text-5xl font-black mt-6 mb-10 leading-snug text-white"></h2>
            
            <!-- Zona Risposta (visibile a tutti durante la fase 'reveal') -->
            <div id="modal-answer-container" class="hidden bg-slate-950 p-4 rounded-xl border border-slate-800 mb-6">
                <span class="text-[10px] text-slate-500 uppercase block font-bold">Risposta Corretta:</span>
                <p id="modal-answer" class="text-xl font-bold text-green-400 mt-1"></p>
            </div>

            <div id="debug-tracer-zone" class="mb-8 p-4 bg-slate-950/80 rounded-xl border border-slate-700 text-left">
                <span class="text-[10px] font-mono uppercase text-slate-500 block font-bold tracking-widest">Log di Sviluppo</span>
                <p id="debug-tracer-text" class="text-xs font-mono text-slate-300 mt-2 break-words"></p>
            </div>

            <div id="modal-action-zone" class="space-y-4">
                <button onclick="window.revealAnswer()" class="bg-yellow-400 hover:bg-yellow-300 text-slate-900 font-black py-4 px-8 rounded-xl uppercase tracking-wider transition w-full text-lg">
                    Mostra Soluzione 👁️
                </button>
            </div>

            <!-- Messaggio di attesa per i non-master durante la fase di domanda -->
            <div id="modal-waiting-for-reveal" class="hidden p-4 border-2 border-blue-500/30 bg-blue-500/10 rounded-xl mt-4">
                <p class="text-blue-300 font-bold text-sm">In attesa che il Master riveli la soluzione...</p>
            </div>

            <div id="modal-resolution-zone" class="hidden space-y-6">
                <p id="modal-turn-prompt" class="text-yellow-400 font-bold text-sm uppercase tracking-wide"></p>
                
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="window.resolveTurn(true)" class="bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-xl uppercase">Indovinata! ✅</button>
                    <button onclick="window.resolveTurn(false)" class="bg-red-600 hover:bg-red-500 text-white font-bold py-3 rounded-xl uppercase">Sbagliata! ❌</button>
                </div>
            </div>

            <!-- Messaggio di attesa per i non-master durante la fase di giudizio -->
            <div id="modal-waiting-for-master" class="hidden p-4 border-2 border-yellow-500/30 bg-yellow-500/10 rounded-xl mt-4">
                <p class="text-yellow-300 font-bold text-sm">Il Master sta decidendo l'esito del turno...</p>
            </div>
        </div>
    </div>
</div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
