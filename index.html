<script>
const app = document.getElementById('app');

const SUPABASE_URL = "https://dtgitfiutlmymlgysovj.supabase.co"; 
const SUPABASE_ANON_KEY = "sb_publishable_w688bWi3FPCUDEPHumsqPA_QAils40A";
const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const urlParams = new URLSearchParams(window.location.search);
const currentRoomId = urlParams.get('room');
let nomeGiocatoreLocale = sessionStorage.getItem("je0pardy_nome") || ""; 

let players = [];
let currentPlayerIndex = 0; 
let gameBoardState = {}; 
let averageAge = 40;

const API_KEYS = typeof CONTENITORE_CHIAVI !== 'undefined' ? CONTENITORE_CHIAVI : [];
let currentKeyIndex = 0; 

let currentModelIndex = 0; 
let currentActiveCell = null; 




const sleep = ms => new Promise(r => setTimeout(r, ms));

// ==========================================
// LOGICA CLOUD E SINCRONIZZAZIONE
// ==========================================
async function avviaSincronizzazioneInTempoReale() {
    console.log("Avvio ascolto Realtime...");
    
    const { data, error } = await sbClient.from('stanze').select('*').eq('id', currentRoomId).single();
    if (data) aggiornaStatoLocale(data);

    if (!realtimeChannel) {
        realtimeChannel = sbClient.channel('stanza_' + currentRoomId)
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'stanze', filter: 'id=eq.' + currentRoomId }, 
            (payload) => { 
                console.log("Database cambiato! Aggiorno la UI...");
                aggiornaStatoLocale(payload.new); 
            })
            .subscribe();
    }
}

function aggiornaStatoLocale(datiCloud) {
    players = datiCloud.giocatori || [];
    gameBoardState = datiCloud.stato_tabellone || {};
    averageAge = datiCloud.eta_media || 40;
    let indiceTurno = players.findIndex(p => p.name === datiCloud.turno_di);
    currentPlayerIndex = indiceTurno !== -1 ? indiceTurno : 0;

    if (datiCloud.fase_gioco === 'setup') {
        renderLobbyAttesa();
    } else if (datiCloud.fase_gioco === 'board') {
        renderGameBoard();
    }
}

function renderSetupScreen() {

    } else if (currentRoomId && !nomeGiocatoreLocale) {
        // SCHERMATA GUEST (CORRETTA)
        app.innerHTML = `

            <h1 class="text-4xl font-black text-blue-400 mb-6">UNISCITI ALLA STANZA</h1>
            <input id="ospite-nome" type="text" class="w-full p-3 mb-4 bg-slate-800 text-white rounded-xl text-center font-bold" placeholder="Il tuo nome" />
            <input id="ospite-eta" type="number" class="w-full p-3 mb-4 bg-slate-800 text-white rounded-xl text-center font-bold" placeholder="La tua età" />
            <button onclick="uniscitiAStanzaCloud()" class="w-full bg-blue-500 hover:bg-blue-600 p-4 rounded-xl text-white font-black uppercase transition">Entra nel Gioco</button>
        </div>`;
    }
}

async function creaNuovaStanzaCloud() {
    const nomeInput = document.getElementById('creatore-nome').value.trim();
    const etaInput = document.getElementById('creatore-eta').value;
    
    // 1. Validazione: il nome è vuoto o l'età non è un numero valido > 0?
    const eta = parseInt(etaInput);
    
    if (!nomeInput || isNaN(eta) || eta <= 0) {
        alert("Attenzione: devi inserire un nome valido e un'età corretta per iniziare!");
        return; // <--- Questo è il muro: la funzione si ferma qui se i dati mancano
    }
    
    // 2. Se arriviamo qui, i dati sono validi
    nomeGiocatoreLocale = nomeInput;
    sessionStorage.setItem("je0pardy_nome", nomeInput); 
    
    players = [{ name: nomeInput, score: 0, correct: 0, wrong: 0, age: eta }];
    
    const { data, error } = await sbClient.from('stanze').insert([{
        stato_tabellone: {}, 
        giocatori: players, 
        turno_di: nomeInput, 
        fase_gioco: 'setup',
        eta_media: eta 
    }]).select();

    if (!error) {
        window.location.search = `?room=${data[0].id}`;
    } else {
        alert("Errore durante la creazione della stanza: " + error.message);
    }
}
async function uniscitiAStanzaCloud() {
    const nomeInput = document.getElementById('ospite-nome').value.trim();
    const etaInput = parseInt(document.getElementById('ospite-eta').value);

    if (!nomeInput || isNaN(etaInput)) {
        alert("Inserisci nome ed età!");
        return;
    }

    // 1. Recupero i dati della stanza da Supabase
    const { data: stanzaData, error } = await sbClient
        .from('stanze')
        .select('giocatori')
        .eq('id', currentRoomId)
        .single();

    if (error || !stanzaData) {
        console.error("Errore nel recupero stanza:", error);
        return;
    }

    // 2. Ora stanzaData esiste, procediamo
    let giocatoriDB = stanzaData.giocatori || [];
    
    if (!giocatoriDB.find(p => p.name === nomeInput)) {
        giocatoriDB.push({ name: nomeInput, score: 0, correct: 0, wrong: 0, age: etaInput });
        
        // Ricalcola media
        const media = Math.round(giocatoriDB.reduce((sum, p) => sum + p.age, 0) / giocatoriDB.length);

        await sbClient.from('stanze').update({ 
            giocatori: giocatoriDB,
            eta_media: media 
        }).eq('id', currentRoomId);
    }
    
    // 3. Salviamo in locale e avviamo
    nomeGiocatoreLocale = nomeInput;
    sessionStorage.setItem("je0pardy_nome", nomeInput); 
    avviaSincronizzazioneInTempoReale();
}

        ${isCreatore ?

            : 
            `<div class="p-4 rounded-xl border border-blue-500/50 bg-blue-500/10 text-blue-400 font-bold animate-pulse">In attesa che il creatore avvii la partita... ⏳</div>`

}

// ==========================================
// LOGICA DI GIOCO E AI (COMPLETA E INVARIATA)
// ==========================================
async function fetchAIWithRetry(prompt, attempt = 1) {
    if (API_KEYS.length === 0) {
        throw new Error("Nessuna chiave trovata nel file chiavi.js. Verifica il setup!");
    }
    const model = MODEL_CHAIN[currentModelIndex];
    const activeKey = API_KEYS[currentKeyIndex].trim(); 
    const statusExtra = document.getElementById('modal-status-extra');
    
    if (statusExtra) {
        statusExtra.innerText = "Chiamata AI -> Modello: " + model + " | Slot Chiave: " + (currentKeyIndex + 1);
    }

    const systemInstruction = "Rispondi ESCLUSIVAMENTE con un oggetto JSON valido. Non includere blocchi di codice markdown ```json o testo extra.";
    const pureUrl = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${activeKey}`;

    try {
        const response = await fetch(pureUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] },
                generationConfig: { responseMimeType: "application/json" }
            })
        });

        if (response.status === 429 || response.status === 503) {
            console.warn(`[RETRY] HTTP ${response.status}. Cambio slot chiave...`);
            await sleep(300);
            currentKeyIndex = (currentKeyIndex + 1) % API_KEYS.length;
            if (attempt < 3) {
                currentModelIndex = (currentModelIndex + 1) % MODEL_CHAIN.length;
                return await fetchAIWithRetry(prompt, attempt + 1); 
            }
        }

        if (!response.ok) {
            const errorDetails = await response.text();
            throw new Error(`Codice HTTP ${response.status} - ${errorDetails}`);
        }

        currentModelIndex = (currentModelIndex + 1) % MODEL_CHAIN.length;

        const data = await response.json();
        let rawText = data.candidates[0].content.parts[0].text.trim();
        if (rawText.startsWith("```")) {
            rawText = rawText.replace(/```json|```/g, "").trim();
        }
        return JSON.parse(rawText);

    } catch (err) {
        console.error("Tentativo " + attempt + " fallito:", err);
        if (attempt < 3) {
            await sleep(300);
            currentKeyIndex = (currentKeyIndex + 1) % API_KEYS.length;
            currentModelIndex = (currentModelIndex + 1) % MODEL_CHAIN.length;
            return await fetchAIWithRetry(prompt, attempt + 1);
        }
        throw err;
    }
}

function renderGameBoard() {
    const numeroTotaleCelle = aiCategories.length * valoriTabellone.length;
    const celleCompletate = Object.keys(gameBoardState).length;
    const isMyTurn = (players[currentPlayerIndex].name === nomeGiocatoreLocale);

        renderEndGameScreen();

    }

    let playersHtml = players.map((p, idx) => `

        </div>
    `).join('');

            gridCells += `<div class="bg-slate-950/80 border border-slate-900 flex items-center justify-center min-h-[55px] text-slate-700 font-bold text-sm">❌</div>`;

            if (!isMyTurn) {
                gridCells += `
                <div class="bg-slate-800/20 border border-slate-800 text-slate-600 font-black text-xl flex items-center justify-center min-h-[55px] opacity-50 cursor-not-allowed">
                    ${val}€
                </div>`;
            } else {
                // Se è il mio turno, il bottone è attivo
                gridCells += `
                <button onclick="launchQuestion(${catIdx}, ${val})" class="bg-blue-950/40 border border-slate-800 hover:bg-blue-600 hover:text-white text-yellow-400 font-black text-xl tracking-wide transition duration-150 flex items-center justify-center min-h-[55px]">
                    ${val}€
                </button>`;
            }
        }
    });
});

    app.innerHTML = `
    <div class="w-full space-y-6">
        <div class="flex flex-col md:flex-row justify-between items-center bg-slate-900/80 p-4 rounded-2xl border border-slate-800 gap-4">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 flex-grow w-full">
                ${playersHtml}
            </div>
            <div class="bg-blue-950/30 border border-blue-500/20 px-4 py-3 rounded-xl text-center md:text-right shrink-0">
                <span class="text-sm font-bold text-blue-400">Età Media: ${averageAge} anni</span>
            </div>
        </div>

        <div class="overflow-x-auto bg-slate-900/30 p-2 rounded-2xl border border-slate-800/50">
            <div class="grid grid-cols-10 gap-1 min-w-[1000px]">
                ${gridHeaders}
                ${gridCells}
            </div>
        </div>
    </div>`;
}

async function launchQuestion(catIdx, val) {
    const category = aiCategories[catIdx];
    currentActiveCell = { id: catIdx + "-" + val, category: category, value: val };

    document.getElementById('modal-status-extra').innerText = "";
    document.getElementById('modal-loading').classList.remove('hidden');
    document.getElementById('modal-content').classList.add('hidden');
    document.getElementById('modal-resolution-zone').classList.add('hidden');
    document.getElementById('modal-action-zone').classList.remove('hidden');
    document.getElementById('game-modal').classList.remove('hidden');

    function useLocalFallback(reasonMessage, badgeText, isRealError = false) {
        let qText = "Indizio di riserva non trovato.";
        let aText = "N/D";
        
        if (BACKUP_TRIVIA[category] && BACKUP_TRIVIA[category][val]) {
            qText = BACKUP_TRIVIA[category][val].q;
            aText = BACKUP_TRIVIA[category][val].a;
        }

        document.getElementById('modal-badge-cat').innerText = category + " • €" + val;
        document.getElementById('modal-badge-source').innerText = badgeText;
        
        const badgeElement = document.getElementById('modal-badge-source');
        if(isRealError) {
            badgeElement.className = "text-xs px-3 py-1 bg-red-500/20 text-red-400 rounded-full font-bold uppercase border border-red-500/30";
        } else {
            badgeElement.className = "text-xs px-3 py-1 bg-green-500/20 text-green-400 rounded-full font-bold uppercase border border-green-500/30";
        }
        
        document.getElementById('modal-question').innerText = qText;
        document.getElementById('modal-answer').innerText = aText;
        
        document.getElementById('debug-tracer-text').innerHTML = `Sorgente: <strong class="${isRealError ? 'text-red-400' : 'text-green-400'}">${badgeText}</strong><br>Motivo: ${reasonMessage}`;

        document.getElementById('modal-loading').classList.add('hidden');
        document.getElementById('modal-content').classList.remove('hidden');
    }

    const coinFlip = Math.random();

    if (coinFlip >= 0.5) {
        await sleep(300); 
        useLocalFallback(`La moneta (Moneta >= 0.5) ha estratto l'esecuzione offline istantanea.`, "[DATABASE LOCALE]", false);
    } else {
        document.getElementById('loading-text').innerText = "Interrogazione API Gemini...";

        const config = DIFFICULTY_LEVELS[val];
        const promptDomanda = "Sei l'autore senior del quiz Je0pardy!. Genera una singola domanda in italiano per la categoria: \"" + category + "\".\n" +
        "Valore: €" + val + ". Difficoltà richiesta per la casella: livello " + config.level + "/5 (" + config.desc + ")." +
        "\n\nREGOLA DI BILANCIAMENTO GENERALE:\nTutte le domande devono essere tarate sulla cultura e competenze tipiche di persone con un'ETÀ MEDIA DI " + averageAge + " ANNI." +
        "\n\nL'indizio deve essere una affermazione di massimo 12 parole. La risposta deve essere secca (1-3 parole)." +
        "\nRispondi esclusivamente in formato JSON, senza markdown:\n" +
        "{ \"question\": \"Testo indizio\", \"answer\": \"Risposta\" }";

        try {
            const parsed = await fetchAIWithRetry(promptDomanda);
            
            document.getElementById('modal-badge-cat').innerText = category + " • €" + val;
            document.getElementById('modal-badge-source').innerText = "[GENERATO DA AI]";
            document.getElementById('modal-badge-source').className = "text-xs px-3 py-1 bg-purple-500/20 text-purple-400 rounded-full font-bold uppercase border border-purple-500/30";
            
            document.getElementById('modal-question').innerText = parsed.question || parsed.q;
            document.getElementById('modal-answer').innerText = parsed.answer || parsed.a;
            
            document.getElementById('debug-tracer-text').innerHTML = `Sorgente: <strong class="text-purple-400">[LIVE AI VIA API]</strong><br>Motivo: Risposta generata in tempo reale dai server remoti con successo.`;

            document.getElementById('modal-loading').classList.add('hidden');
            document.getElementById('modal-content').classList.remove('hidden');

        } catch (err) {
            useLocalFallback(`${err.message}`, "[FALLBACK LOCALE]", true);
        }
    }
}

function revealAnswer() {
    document.getElementById('modal-action-zone').classList.add('hidden');
    document.getElementById('modal-resolution-zone').classList.remove('hidden');
    const activePlayerName = players[currentPlayerIndex].name;
    document.getElementById('modal-turn-prompt').innerText = "🤔 " + activePlayerName + ", risposta esatta?";
}

async function resolveTurn(isCorrect) {
    const val = currentActiveCell.value;
    
    // 1. Aggiorna stato locale
    if (isCorrect) { 
        players[currentPlayerIndex].score += val; 
        players[currentPlayerIndex].correct++; 
    } else { 
        players[currentPlayerIndex].score -= val; 
        players[currentPlayerIndex].wrong++; 
        currentPlayerIndex = (currentPlayerIndex + 1) % players.length; 
    }
    gameBoardState[currentActiveCell.id] = true;
    
    // 2. IMPORTANTE: Salva su Supabase per far scattare il Realtime!
    await sbClient.from('stanze')
        .update({ 
            giocatori: players, 
            stato_tabellone: gameBoardState,
            turno_di: players[currentPlayerIndex].name // Passa il turno nel DB
        })
        .eq('id', currentRoomId);

    // 3. Pulisci e chiudi
    currentActiveCell = null;
    document.getElementById('game-modal').classList.add('hidden');
    renderGameBoard();
}

            </div>
            <div class="text-xl font-black ${p.score >= 0 ? 'text-green-400' : 'text-red-400'}">
                ${p.score} €
            </div>

    `).join('');
